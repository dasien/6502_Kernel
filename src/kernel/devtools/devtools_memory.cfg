# devtools_memory.cfg - linker config for the dev-tools module ROM
# Loads at $B000-$DFFF (12KB) - the bankable module window (module bank 2).
# The entry point (DEVT_MAIN) must be the first byte of CODE so it sits at
# $B000, matching the MODULE_DIR entry in the kernel.

MEMORY {
    MODULE: start = $B000, size = $3000, fill = yes, fillval = $00;
}

SEGMENTS {
    # Code first so DEVT_MAIN lands exactly at $B000 (the module entry).
    CODE: load = MODULE, type = ro;

    # Data (opcode table, strings).
    DATA: load = MODULE, type = ro;
}
