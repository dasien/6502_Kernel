# memory.cfg - Memory configuration for 6502 Kernel ROM
# Based on Commodore 64 memory layout

MEMORY {
    # Zero Page - First 256 bytes of RAM (fastest access)
    ZP:     start = $0000, size = $0100, type = rw;

    # RAM - General purpose RAM
    RAM:    start = $0200, size = $7E00, type = rw;

    # ROM Area - Kernel code and data (8KB from $E000-$FFFF). Memory-mapped I/O
    # is shadowed at $FE00-$FEFF by the emulator; the IORESV segment below keeps
    # CODE from growing into it.
    ROM:    start = $E000, size = $2000, type = ro;
}

SEGMENTS {
    # Code segment goes in ROM ($E000 up to, but not into, the I/O page)
    CODE:   load = ROM, type = ro;

    # Reserved 256-byte I/O page at $FE00-$FEFF (keyboard, file I/O, bank select).
    # Occupied so the linker errors if CODE ever overruns into it.
    IORESV: load = ROM, start = $FE00, type = ro;

    # Jump table at $FF00
    JUMPS:  load = ROM, start = $FF00, type = ro;

    # Interrupt vectors at top of ROM
    VECS:   load = ROM, start = $FFFA, type = ro;
}

FEATURES {
    CONDES: segment = STARTUP,
            type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__;
    CONDES: segment = STARTUP,
            type = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__;
}

SYMBOLS {
    # Export ROM start for reference
    __ROM_START__: value = $E000, type = export;
    __ROM_SIZE__:  value = $2000, type = export;
}