# dos_memory.cfg - linker config for the MFC-DOS resident ROM
# Loads at $9000-$AFFF (8KB) - always mapped by the emulator (never banked).
# Holds the resident FAT16 filesystem and, later, the DOS command shell.
# The signature/entry must be the first byte of CODE so it sits at $9000.

MEMORY {
    DOS: start = $9000, size = $2000, fill = yes, fillval = $00;
}

SEGMENTS {
    # Code first so the signature/entry lands exactly at $9000.
    CODE: load = DOS, type = ro;

    # Data (tables, strings).
    DATA: load = DOS, type = ro;

    # DOS ABI jump table at a fixed address ($AF00), like the kernel's $FF00
    # table. Callers bind to these stable entry points.
    DOSJUMP: load = DOS, start = $AF00, type = ro;
}
